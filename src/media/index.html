<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}}; script-src {{cspSource}};">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Env Form Editor</title>
    <link href="{{cssUri}}" rel="stylesheet">
</head>
<body class="relative container mx-auto p-4 min-h-screen">

  <header class="flex flex-col md:flex-row md:items-center justify-between gap-5 py-3 border-b border-gray-500/50 mb-6">
    <div>
      <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold">Environment Variables</h1>
      <p class="text-base text-gray-300">Manage your environment variables here. Or <button type="button" id="view-plaintext-btn" class="text-blue-400 hover:text-blue-300 underline">view as plaintext</button>.</p>
    </div>
    <button id="add-env-btn" type="button" class="py-2 px-3 rounded-md font-semibold text-gray-900 bg-gray-300 hover:bg-gray-400">&#43; Add Variable</button>
  </header>

  <main>
    <div class="sticky top-0 flex text-gray-300 items-center gap-2 mb-4 border border-gray-500/70 rounded-md w-full max-w-sm hover:ring-2 hover:ring-gray-500/80 focus-within:ring-2 focus-within:ring-gray-500/80 backdrop-blur-md z-20 bg-white/10">
      <span class="p-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>
      </span>
      <input id="search-input" type="text" class="flex-1 bg-transparent focus:outline-none" placeholder="Search variables...">
    </div>

    <div class="border border-gray-500/70 rounded-md overflow-hidden">
      <ul id="env-list" class="divide-y divide-gray-500/70"></ul>
      <p id="env-empty" class="hidden p-8 text-center text-gray-500">No environment variables found.</p>
    </div>
  </main>

  <div id="add-modal" class="fixed inset-0 items-center justify-center z-50 bg-black/60 hidden">
    <div id="modal-box" class="border border-gray-700 p-5 rounded-md bg-gray-800/95 backdrop-blur-sm w-[90vw] max-w-xl">
      <h2 id="modal-title" class="text-lg font-semibold mb-4">Add Environment Variable</h2>

      <div class="flex flex-col gap-4 border-b border-gray-700/70 mb-4 pb-4">
        <label class="flex flex-col gap-1.5">
          <span class="text-sm text-gray-300">Key</span>
          <input type="text" id="new-key" autocomplete="off" spellcheck="false"
            class="w-full p-2 rounded-md bg-gray-700/50 border border-gray-500/70 focus:ring-2 focus:ring-gray-400 focus:outline-none font-mono">
        </label>

        <label class="flex flex-col gap-1.5">
          <span class="text-sm text-gray-300">Value</span>
          <input type="text" id="new-value" autocomplete="off" spellcheck="false"
            class="w-full p-2 rounded-md bg-gray-700/50 border border-gray-500/70 focus:ring-2 focus:ring-gray-400 focus:outline-none font-mono">
        </label>

        <label class="flex flex-col gap-1.5">
          <span class="text-sm text-gray-300">Note <span class="text-gray-500">(optional)</span></span>
          <input type="text" id="new-note" autocomplete="off"
            class="w-full p-2 rounded-md bg-gray-700/50 border border-gray-500/70 focus:ring-2 focus:ring-gray-400 focus:outline-none">
        </label>
      </div>

      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 text-sm">
          <button id="import-btn" type="button" class="border border-gray-500 py-1.5 px-3 rounded-md font-medium text-gray-300 hover:border-gray-300">
            Import .env
          </button>
          <span class="text-gray-500 text-xs">or drop a file anywhere</span>
        </div>

        <div class="flex items-center gap-2">
          <button id="cancel-btn" type="button" class="border border-gray-600 py-1.5 px-3 rounded-md font-medium text-sm text-gray-300">Cancel</button>
          <button id="save-btn" type="button" class="bg-gray-200 py-1.5 px-3 rounded-md font-semibold text-sm text-gray-900">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="drop-overlay" class="fixed inset-0 z-100 bg-black/80 items-center justify-center hidden pointer-events-none">
    <div class="border-2 border-dashed border-orange-500 rounded-2xl px-20 py-14 text-center">
      <p class="text-3xl font-bold text-orange-400">Drop .env file here</p>
      <p class="text-gray-400 mt-2 text-sm">All variables will be merged</p>
    </div>
  </div>

  <script src="{{jsUri}}"></script>
</body>
</html>
